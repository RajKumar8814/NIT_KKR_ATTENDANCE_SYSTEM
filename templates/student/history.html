{% extends "base.html" %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-6">Attendance Timeline</h1>

<div class="bg-white rounded-lg shadow overflow-hidden border border-gray-100">
    <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
                <tr>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Subject</th>
                    <th class="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
                {% for log in history %}
                <tr class="hover:bg-gray-50">
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900">{{ log.date }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{{ log.subject_name }}</td>
                    <td class="px-6 py-4 whitespace-nowrap text-sm font-bold">
                        {% if log.status == 'Present' %}
                        <span class="text-green-600 bg-green-100 px-2 py-1 rounded">Present</span>
                        {% else %}
                        <span class="text-red-600 bg-red-100 px-2 py-1 rounded">Absent</span>
                        {% endif %}
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="3" class="px-6 py-8 text-center text-gray-500 italic">No history available.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
