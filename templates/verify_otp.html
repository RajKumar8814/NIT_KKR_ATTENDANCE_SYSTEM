{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden md:max-w-md mt-10 border border-gray-100">
    <div class="p-8">
        <div class="uppercase tracking-wide text-sm text-blue-600 font-semibold mb-1">Verification</div>
        <h2 class="block mt-1 text-2xl leading-tight font-bold text-gray-900 mb-6">Enter OTP</h2>
        <p class="text-sm text-gray-600 mb-4">We've sent a 6-digit code to your email.</p>
        
        <form method="POST" action="{{ url_for('auth.verify_otp') }}">
            <div class="mb-4">
                <label class="block text-gray-700 text-sm font-bold mb-2" for="otp">
                    6-Digit OTP
                </label>
                <input class="shadow appearance-none border rounded w-full py-3 px-3 text-gray-700 leading-tight focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-center text-xl tracking-widest" 
                       id="otp" type="text" name="otp" placeholder="••••••" maxlength="6" required>
            </div>
            
            <div class="flex items-center justify-between mt-6">
                <button class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-4 rounded w-full transition duration-150 ease-in-out" type="submit">
                    Verify & Login
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
