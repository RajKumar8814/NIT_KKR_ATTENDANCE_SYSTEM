{% extends "base.html" %}
{% block content %}
<div class="py-32 animate-fade">
    <div class="text-center mb-32 max-w-5xl mx-auto">
        <p class="text-[12px] font-black text-slate-400 uppercase tracking-[1.2em] mb-8">National Institute of Technology, Kurukshetra</p>
        <h1 class="text-[6rem] md:text-9xl font-black text-slate-800 tracking-tighter leading-[0.85] mb-4">Smart <br> Attendance</h1>
    </div>

    <!-- Clean Entrance Portals -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-12 max-w-7xl mx-auto px-6">
        <!-- Admin Access -->
        <a href="{{ url_for('auth.login', role='admin') }}" class="premium-card flex flex-col justify-between overflow-hidden group border-none hover:shadow-2xl transition-all h-[400px]">
            <div class="p-12">
                <h2 class="text-4xl font-black text-slate-800 tracking-tighter group-hover:text-slate-600 transition-colors">Admin Portal</h2>
            </div>
            <div class="p-8">
                <div class="btn-premium w-full py-6 uppercase tracking-[0.4em] font-black text-[10px] bg-gradient-to-r from-slate-800 to-slate-700 shadow-xl">Launch Administrator Hub</div>
            </div>
        </a>

        <!-- Teacher Access -->
        <a href="{{ url_for('auth.login', role='teacher') }}" class="premium-card flex flex-col justify-between overflow-hidden group border-none hover:shadow-2xl transition-all h-[400px]">
            <div class="p-12">
                <h2 class="text-4xl font-black text-slate-800 tracking-tighter group-hover:text-teal-600 transition-colors">Faculty Portal</h2>
            </div>
            <div class="p-8">
                <div class="btn-premium w-full py-6 uppercase tracking-[0.4em] font-black text-[10px] bg-gradient-to-r from-teal-500 to-emerald-600 shadow-xl shadow-teal-100">Enter Educator Portal</div>
            </div>
        </a>

        <!-- Student Access -->
        <a href="{{ url_for('auth.login', role='student') }}" class="premium-card flex flex-col justify-between overflow-hidden group border-none hover:shadow-2xl transition-all h-[400px]">
            <div class="p-12">
                <h2 class="text-4xl font-black text-slate-800 tracking-tighter group-hover:text-violet-600 transition-colors">Student Portal</h2>
            </div>
            <div class="p-8">
                <div class="btn-premium w-full py-6 uppercase tracking-[0.4em] font-black text-[10px] bg-gradient-to-r from-violet-500 to-indigo-600 shadow-xl shadow-violet-100">View Personal Log</div>
            </div>
        </a>
    </div>

    <div class="mt-48 text-center">
        <p class="text-[10px] font-black text-slate-300 uppercase tracking-[1.5em] animate-pulse">Select Your Official Portal to Authenticate</p>
    </div>
</div>
{% endblock %}
