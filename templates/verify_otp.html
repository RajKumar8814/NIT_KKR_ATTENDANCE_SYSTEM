{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto py-32 animate-fade">
    <div class="premium-card p-12 text-center">
        <div class="h-16 w-16 bg-indigo-500/10 rounded-2xl flex items-center justify-center mx-auto mb-8">
            <svg class="h-8 w-8 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 00-2 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
        </div>
        
        <h1 class="text-4xl font-bold mb-2">Check Email</h1>
        <p class="text-gray-400 font-medium mb-10">We've sent a 6-digit code to your inbox.</p>
        
        <form method="POST" action="{{ url_for('auth.verify_otp') }}" class="space-y-6">
            <input class="w-full text-center h-20 bg-white/5 border border-white/10 rounded-2xl px-6 text-white text-5xl font-black tracking-[0.4em] focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all font-mono placeholder:text-gray-800" 
                   id="otp" type="text" name="otp" placeholder="000000" maxlength="6" required autofocus>

            <button class="btn-premium w-full h-14" type="submit">
                Securely Verify OTP
            </button>
        </form>

        <div class="mt-8 text-center pt-8 border-t border-white/5">
            <a href="{{ url_for('auth.login') }}" class="text-xs font-bold text-gray-500 uppercase tracking-widest hover:text-indigo-400 transition-colors">Resend Code</a>
        </div>
    </div>
</div>
{% endblock %}
