{% extends "base.html" %}
{% block content %}
<div class="max-w-2xl mx-auto py-32 animate-fade">
    <div class="premium-card p-12">
        <h1 class="text-4xl font-bold mb-2 text-white">Start Session</h1>
        <p class="text-gray-400 font-medium mb-12">Select subject and upload group photo for AI analysis.</p>
        
        <form action="{{ url_for('teacher.setup_attendance') }}" method="POST" enctype="multipart/form-data" class="space-y-8">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2 ml-1">Select Course</label>
                    <select name="subject_id" class="w-full h-14 bg-white/5 border border-white/10 rounded-2xl px-6 text-white text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/50 appearance-none font-bold" required>
                        <option value="">-- Subject --</option>
                        {% for sub in teacher.subjects %}
                            <option value="{{ sub.subject_id }}">{{ sub.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2 ml-1">Session Date</label>
                    <input type="date" name="date" class="w-full h-14 bg-white/5 border border-white/10 rounded-2xl px-6 text-white text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/50 font-bold" value="{{ datetime_today }}">
                </div>
            </div>

            {% for sub in teacher.subjects %}
                <input type="hidden" name="class_id" value="{{ sub.class_id }}">
            {% endfor %}

            <div>
                <label class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-4 ml-1">Group Photo Capture</label>
                <div class="relative group cursor-pointer border-2 border-dashed border-white/10 rounded-3xl p-16 bg-white/1 hover:bg-white/5 transition-all text-center">
                    <div class="space-y-4">
                        <svg class="h-12 w-12 text-indigo-400 mx-auto group-hover:scale-110 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 9a2 2 0 012-2h.93a2 2 0 001.664-.89l.812-1.22A2 2 0 0110.07 4h3.86a2 2 0 011.664.89l.812 1.22A2 2 0 0018.07 7H19a2 2 0 012 2v9a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 13a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
                        <p class="text-sm font-bold text-gray-400 uppercase tracking-widest">Select class photo</p>
                        <p class="text-[10px] font-black text-gray-600 uppercase tracking-widest">Supports high-res AI matching</p>
                    </div>
                    <input type="file" name="group_photo" class="absolute inset-0 opacity-0 cursor-pointer" accept="image/*" required>
                </div>
            </div>

            <button class="btn-premium w-full h-16 text-lg uppercase tracking-widest" type="submit">
                Run AI Scan →
            </button>
        </form>
    </div>
</div>
{% endblock %}
