{% extends "base.html" %}
{% block content %}
<div class="h-[calc(100vh-80px)] flex flex-col items-center justify-center animate-fade">
    <div class="premium-card w-full max-w-xl relative overflow-hidden backdrop-blur-3xl border-pink-50 hover:border-pink-100">
        <!-- Brand Recognition Orbs (Light Mode) -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-pink-500/5 blur-3xl rounded-full"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-amber-500/5 blur-3xl rounded-full"></div>

        <div class="relative z-10 text-center">
            <h1 class="text-6xl font-black mb-2 text-slate-800 tracking-tighter">Enter Area</h1>
            <p class="text-pink-400 font-bold mb-12 text-[10px] uppercase tracking-[0.4em]">Official Academic Gate</p>
            
            <form action="{{ url_for('auth.login') }}" method="POST" class="space-y-8 text-left">
                <input type="hidden" name="role" value="{{ role }}">
                
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.5em] text-slate-400 mb-4 ml-1">Account Identity</label>
                    <input type="email" name="email" placeholder="Institutional Email" 
                           class="w-full h-16 bg-slate-50/50 border border-slate-200 rounded-[24px] px-8 text-slate-800 text-lg focus:outline-none focus:ring-2 focus:ring-pink-500/30 transition-all placeholder:text-slate-300" required>
                </div>

                <div class="pt-4">
                    <button type="submit" class="btn-premium w-full h-16 tracking-[0.5em] font-black text-xs">
                        Generate Verification →
                    </button>
                    <p class="text-center mt-8">
                        <a href="{{ url_for('index') }}" class="text-[10px] uppercase font-black tracking-widest text-slate-400 hover:text-pink-500 transition-colors">← Back to Portal Selection</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Institutional Compliance Label -->
    <div class="mt-12">
        <p class="text-[10px] font-black text-slate-300 uppercase tracking-[0.8em]">National Institute of Technology Kurukshetra</p>
    </div>
</div>
{% endblock %}
