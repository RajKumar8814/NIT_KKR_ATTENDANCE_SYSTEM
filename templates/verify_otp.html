{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-24 mb-32">
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <div class="bg-gradient-to-r from-blue-600 to-indigo-700 h-2"></div>
        <div class="p-10 text-center">
            <h1 class="text-3xl font-black text-gray-900 mb-2">Check Your Email</h1>
            <p class="text-gray-500 font-medium mb-10">We've sent a 6-digit verification code to your inbox.</p>
            
            <form method="POST" action="{{ url_for('auth.verify_otp') }}" class="space-y-6">
                <div>
                    <label for="otp" class="block text-sm font-bold text-gray-700 mb-4 uppercase tracking-widest text-center">Verification Code</label>
                    <input class="block w-full text-center text-4xl tracking-[0.5em] px-5 py-6 bg-gray-50 border-2 border-dashed border-gray-200 rounded-2xl text-blue-600 focus:outline-none focus:ring-2 focus:ring-blue-600 focus:border-transparent transition-all font-black placeholder:text-gray-300" 
                           id="otp" type="text" name="otp" placeholder="000000" maxlength="6" required autofocus>
                </div>

                <button class="w-full bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-5 rounded-2xl shadow-lg hover:shadow-xl transition-all duration-200 transform hover:-translate-y-1" type="submit">
                    Verify & Sign In
                </button>
            </form>

            <div class="mt-10 pt-8 border-t border-gray-50">
                <p class="text-sm text-gray-400">Didn't receive the code?</p>
                <a href="{{ url_for('auth.login') }}" class="text-blue-600 font-bold hover:underline text-sm">Resend verification code</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
