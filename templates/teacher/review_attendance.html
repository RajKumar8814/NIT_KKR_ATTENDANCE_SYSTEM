{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto px-4 py-10">
    <div class="mb-10 text-center">
        <h1 class="text-4xl font-extrabold text-gray-900 tracking-tight">AI Review</h1>
        <p class="mt-2 text-lg text-gray-500 font-medium">Verify the identified students for the session on {{ data.date }}</p>
    </div>

    <form action="{{ url_for('teacher.review_attendance') }}" method="POST" class="space-y-8">
        <div class="bg-white rounded-3xl shadow-xl border border-gray-100 overflow-hidden">
            <div class="bg-gray-50 p-6 flex flex-col md:flex-row justify-between items-center border-b border-gray-100">
                <div class="flex items-center space-x-2 text-sm font-black uppercase tracking-widest text-gray-400">
                    <svg class="h-4 w-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span>Total ID'd: {{ data.present_rolls|length }}</span>
                </div>
                <div class="flex space-x-4 mt-4 md:mt-0">
                    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl font-black shadow-lg transition-all">Submit Final Register</button>
                    <a href="{{ url_for('teacher.dashboard') }}" class="px-6 py-3 text-gray-400 font-bold hover:text-gray-600">Discard</a>
                </div>
            </div>

            <div class="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {% for student in students %}
                <label class="relative flex items-center p-4 rounded-2xl border-2 cursor-pointer transition-all hover:bg-blue-50 
                    {% if student.roll_no in data.present_rolls %} border-blue-600 bg-blue-50/50 {% else %} border-gray-100 bg-white {% endif %}">
                    <input type="checkbox" name="present_rolls" value="{{ student.roll_no }}" 
                           class="h-5 w-5 text-blue-600 border-gray-300 rounded-lg focus:ring-blue-600"
                           {% if student.roll_no in data.present_rolls %} checked {% endif %}>
                    <div class="ml-4">
                        <p class="text-sm font-bold text-gray-900">{{ student.name }}</p>
                        <p class="text-[10px] font-black text-gray-400 uppercase tracking-widest">{{ student.roll_no }}</p>
                    </div>
                </label>
                {% endfor %}
            </div>
        </div>
    </form>
</div>
{% endblock %}
