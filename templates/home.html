{% extends "base.html" %}
{% block content %}
<div class="py-32 animate-fade">
    <div class="text-center mb-32 max-w-5xl mx-auto">
        <p class="text-[12px] font-black text-emerald-500 uppercase tracking-[1.2em] mb-8">National Institute of Technology, Kurukshetra</p>
        <h1 class="text-[6rem] md:text-9xl font-black text-white tracking-tighter leading-[0.85] mb-4">Smart <br> Attendance</h1>
    </div>

    <!-- Clean Entrance Portals -->
    <div class="grid grid-cols-1 md:grid-cols-3 gap-12 max-w-7xl mx-auto px-6">
        <!-- Admin Access -->
        <a href="{{ url_for('auth.login', role='admin') }}" class="premium-card flex flex-col justify-between overflow-hidden group border-none hover:border-emerald-500/50 transition-all h-[400px]">
            <div class="p-12">
                <h2 class="text-4xl font-black text-white tracking-tighter group-hover:text-emerald-400 transition-colors">Admin Portal</h2>
            </div>
            <div class="p-8">
                <div class="btn-premium w-full py-6 uppercase tracking-[0.4em] font-black text-[10px] bg-gradient-to-r from-emerald-900 to-emerald-800 shadow-xl border border-emerald-500/20">Launch Administrator Hub</div>
            </div>
        </a>

        <!-- Teacher Access -->
        <a href="{{ url_for('auth.login', role='teacher') }}" class="premium-card flex flex-col justify-between overflow-hidden group border-none hover:border-emerald-500/50 transition-all h-[400px]">
            <div class="p-12">
                <h2 class="text-4xl font-black text-white tracking-tighter group-hover:text-emerald-400 transition-colors">Faculty Portal</h2>
            </div>
            <div class="p-8">
                <div class="btn-premium w-full py-6 uppercase tracking-[0.4em] font-black text-[10px] bg-gradient-to-r from-emerald-600 to-emerald-700 shadow-xl shadow-emerald-900/20">Enter Educator Portal</div>
            </div>
        </a>

        <!-- Student Access -->
        <a href="{{ url_for('auth.login', role='student') }}" class="premium-card flex flex-col justify-between overflow-hidden group border-none hover:border-emerald-500/50 transition-all h-[400px]">
            <div class="p-12">
                <h2 class="text-4xl font-black text-white tracking-tighter group-hover:text-emerald-400 transition-colors">Student Portal</h2>
            </div>
            <div class="p-8">
                <div class="btn-premium w-full py-6 uppercase tracking-[0.4em] font-black text-[10px] bg-gradient-to-r from-emerald-500 to-emerald-600 shadow-xl shadow-emerald-900/20">View Personal Log</div>
            </div>
        </a>
    </div>

    <div class="mt-48 text-center text-emerald-900">
        <p class="text-[10px] font-black text-emerald-700 uppercase tracking-[1.5em] animate-pulse">Select Your Official Portal to Authenticate</p>
    </div>
</div>
{% endblock %}
