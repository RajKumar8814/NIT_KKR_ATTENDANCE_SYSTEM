{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto py-32 animate-fade">
    <div class="premium-card p-12">
        <h1 class="text-4xl font-bold mb-2">AI Review</h1>
        <p class="text-gray-400 font-medium mb-12">Verify identified students for session date <span class="text-indigo-400 font-black">{{ data.date }}</span></p>
        
        <form action="{{ url_for('teacher.review_attendance') }}" method="POST" class="space-y-12">
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                {% for student in students %}
                <label class="premium-card p-6 flex items-center justify-between cursor-pointer border-transparent hover:bg-white/5 transition-all
                    {% if student.roll_no in data.present_rolls %} bg-indigo-500/10 border-indigo-500/20 {% endif %}">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" name="present_rolls" value="{{ student.roll_no }}" 
                               class="h-5 w-5 bg-white/5 border border-white/10 rounded-lg text-indigo-500 focus:ring-indigo-500/50"
                               {% if student.roll_no in data.present_rolls %} checked {% endif %}>
                        <div>
                            <p class="font-bold text-sm text-white leading-tight">{{ student.name }}</p>
                            <p class="text-[10px] font-black text-gray-500 uppercase tracking-widest mt-1">{{ student.roll_no }}</p>
                        </div>
                    </div>
                </label>
                {% endfor %}
            </div>

            <div class="flex gap-4 pt-12 border-t border-white/5">
                <a href="{{ url_for('teacher.dashboard') }}" class="flex-1 btn-premium bg-white/5 border border-white/10 hover:bg-white/10 text-xs font-bold uppercase tracking-widest h-16">Discard Scan</a>
                <button class="flex-2 btn-premium w-full h-16 text-lg uppercase tracking-widest" type="submit">
                    Save Final Attendance → 
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
