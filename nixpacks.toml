[variables]
    NIXPACKS_PYTHON_VERSION = "3.10"

[phases.setup]
    nixPkgs = ["cmake", "libglvnd", "gcc", "stdenv.cc.cc.lib", "xorg.libX11", "python310"]

[phases.install]
    # Virtual environment ke bina seedha install
    cmds = ["pip install --upgrade pip", "pip install -r requirements.txt"]

[start]
    # Seedha gunicorn call, koi path ka jhanjhat nahi
    cmd = "gunicorn --bind 0.0.0.0:$PORT app:app"