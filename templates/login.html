{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto py-32 animate-fade">
    <div class="premium-card p-12">
        <h1 class="text-4xl font-bold mb-2">Welcome Back</h1>
        <p class="text-gray-400 font-medium mb-10">Accessing the {% if role %}{{ role.capitalize() }}{% else %}Identity{% endif %} Portal</p>
        
        <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-6">
            <input type="hidden" name="role" value="{{ role }}">
            
            <div>
                <label for="email" class="block text-xs font-bold uppercase tracking-widest text-gray-500 mb-2 ml-1">Email Address</label>
                <input class="w-full h-14 bg-white/5 border border-white/10 rounded-2xl px-6 text-white text-lg focus:outline-none focus:ring-2 focus:ring-indigo-500/50 transition-all font-medium placeholder:text-gray-600" 
                       id="email" type="email" name="email" placeholder="name@college.edu" required>
            </div>

            <button class="btn-premium w-full h-14" type="submit">
                Request Secure OTP
            </button>
        </form>

        <div class="mt-8 text-center pt-8 border-t border-white/5">
            <p class="text-xs font-bold text-gray-500 uppercase tracking-widest">Unauthorized Access is Prohibited</p>
        </div>
    </div>
</div>
{% endblock %}
