{% extends "base.html" %}
{% block content %}
<div class="h-[calc(100vh-80px)] flex flex-col items-center justify-center animate-fade">
    <div class="premium-card w-full max-w-xl relative overflow-hidden backdrop-blur-3xl border-red-500/10 hover:border-red-500/30">
        <!-- Brand Recognition Orbs -->
        <div class="absolute -top-24 -left-24 w-48 h-48 bg-red-600/10 blur-3xl rounded-full"></div>
        <div class="absolute -bottom-24 -right-24 w-48 h-48 bg-amber-500/10 blur-3xl rounded-full"></div>

        <div class="relative z-10 text-center">
            <h1 class="text-6xl font-black mb-2 text-white tracking-tighter">Enter Area</h1>
            <p class="text-amber-500/50 font-bold mb-12 text-xs uppercase tracking-[0.4em]">Official Academic Gate</p>
            
            <form action="{{ url_for('auth.login') }}" method="POST" class="space-y-8 text-left">
                <input type="hidden" name="role" value="{{ role }}">
                
                <div>
                    <label class="block text-[10px] font-black uppercase tracking-[0.5em] text-gray-500 mb-4 ml-1">Account Identity</label>
                    <input type="email" name="email" placeholder="Faculty/Student Email" 
                           class="w-full h-16 bg-white/5 border border-red-500/10 rounded-[24px] px-8 text-white text-lg focus:outline-none focus:ring-2 focus:ring-red-500/50 transition-all placeholder:text-gray-800" required>
                </div>

                <div class="pt-4">
                    <button type="submit" class="btn-premium w-full h-16 tracking-[0.5em] font-black text-xs">
                        Generate Verification →
                    </button>
                    <p class="text-center mt-8">
                        <a href="{{ url_for('index') }}" class="text-[10px] uppercase font-black tracking-widest text-gray-600 hover:text-amber-500 transition-colors">← Back to Portal Selection</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
    
    <!-- Institutional Compliance Label -->
    <div class="mt-12">
        <p class="text-[10px] font-black text-white/5 uppercase tracking-[0.8em]">National Institute of Technology Kurukshetra</p>
    </div>
</div>
{% endblock %}
